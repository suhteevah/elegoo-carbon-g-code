# =============================================================================
# PrusaSlicer Profile: Elegoo Centauri Carbon - PETG (Default)
# =============================================================================
# Usage:
#   prusa-slicer-console.exe -g --load elegoo_centauri_carbon_petg.ini model.stl -o output.gcode
#
# Printer: Elegoo Centauri Carbon (CoreXY, Klipper, Direct Drive)
# Build Volume: 256 x 256 x 256 mm
# Filament: Generic PETG
# Nozzle: 0.4mm
# =============================================================================

# --- Printer Settings ---
printer_technology = FFF
bed_shape = 0x0,256x0,256x256,0x256
max_print_height = 256
nozzle_diameter = 0.4
printer_model =
printer_notes = Elegoo Centauri Carbon CoreXY - Klipper firmware
gcode_flavor = klipper
use_relative_e_distances = 1
use_firmware_retraction = 0
single_extruder_multi_material = 0

# --- Start / End G-code ---
# Klipper-style start g-code for Centauri Carbon
start_gcode = ;Elegoo Centauri Carbon - Start G-code\nM140 S[first_layer_bed_temperature] ; set bed temp\nM104 S150 ; preheat nozzle to 150 (prevent ooze)\nG28 ; home all axes\nG29 ; auto bed leveling (if configured in Klipper)\nM190 S[first_layer_bed_temperature] ; wait for bed temp\nG1 Z5 F3000 ; move nozzle up\nM109 S[first_layer_temperature] ; wait for nozzle temp\n; Prime line\nG92 E0\nG1 X5 Y5 F3000\nG1 Z0.3 F1500\nG1 X5 Y150 E15 F1500 ; draw prime line\nG1 X5.4 Y150 F5000\nG1 X5.4 Y5 E30 F1500 ; draw second prime line\nG92 E0\nG1 Z2 F3000 ; lift nozzle\n;End of start G-code

end_gcode = ;Elegoo Centauri Carbon - End G-code\nG91 ; relative positioning\nG1 E-2 F2700 ; retract filament\nG1 Z5 F3000 ; lift nozzle 5mm\nG90 ; absolute positioning\nG1 X5 Y250 F6000 ; present print\nM104 S0 ; turn off hotend\nM140 S0 ; turn off bed\nM107 ; turn off fan\nM84 ; disable steppers\n;End of end G-code

before_layer_gcode = ;BEFORE_LAYER_CHANGE\n;[layer_z]\n
layer_gcode = ;AFTER_LAYER_CHANGE\n;[layer_z]\n
toolchange_gcode =
between_objects_gcode =

# Extruder settings
deretract_speed = 0
retract_before_travel = 2
retract_before_wipe = 0
retract_layer_change = 0
retract_length = 0.8
retract_lift = 0.4
retract_restart_extra = 0
retract_speed = 35
wipe = 0

# Machine limits (Klipper manages the real limits, these are for slicer estimation)
machine_max_acceleration_e = 5000,5000
machine_max_acceleration_extruding = 10000,10000
machine_max_acceleration_retracting = 10000,10000
machine_max_acceleration_travel = 10000,10000
machine_max_acceleration_x = 10000,10000
machine_max_acceleration_y = 10000,10000
machine_max_acceleration_z = 500,500
machine_max_feedrate_e = 120,120
machine_max_feedrate_x = 500,500
machine_max_feedrate_y = 500,500
machine_max_feedrate_z = 20,20
machine_max_jerk_e = 5,5
machine_max_jerk_x = 10,10
machine_max_jerk_y = 10,10
machine_max_jerk_z = 0.4,0.4
machine_min_extruding_rate = 0,0
machine_min_travel_rate = 0,0

# --- Print Settings ---
layer_height = 0.2
first_layer_height = 0.2
perimeters = 3
top_solid_layers = 5
bottom_solid_layers = 4

# Infill
fill_density = 20%
fill_pattern = grid
top_fill_pattern = monotonic
bottom_fill_pattern = monotonic
infill_overlap = 25%
infill_anchor = 600%
infill_anchor_max = 50

# Speeds (moderate for PETG - not as fast as PLA)
perimeter_speed = 60
small_perimeter_speed = 30
external_perimeter_speed = 30
infill_speed = 80
solid_infill_speed = 60
top_solid_infill_speed = 30
support_material_speed = 40
support_material_interface_speed = 100%
bridge_speed = 25
gap_fill_speed = 30
travel_speed = 150
travel_speed_z = 0
first_layer_speed = 25
first_layer_speed_over_raft = 30

# Extrusion widths
extrusion_width = 0.45
first_layer_extrusion_width = 0.45
perimeter_extrusion_width = 0.45
external_perimeter_extrusion_width = 0.45
infill_extrusion_width = 0.45
solid_infill_extrusion_width = 0.45
top_infill_extrusion_width = 0.4

# Walls / Perimeters
external_perimeters_first = 0
extra_perimeters = 1
thin_walls = 1
overhangs = 1
seam_position = aligned

# Skirt / Brim
skirts = 1
skirt_distance = 5
skirt_height = 1
min_skirt_length = 0
brim_width = 0
brim_type = outer_only

# Support
support_material = 0
support_material_auto = 0
support_material_threshold = 0
support_material_enforce_layers = 0
support_material_pattern = rectilinear
support_material_spacing = 2.5
support_material_angle = 0
support_material_interface_layers = 3
support_material_interface_spacing = 0
support_material_contact_distance = 0.2
support_material_xy_spacing = 50%
dont_support_bridges = 1

# --- Filament Settings (PETG) ---
filament_type = PETG
filament_colour = #FF8000
filament_diameter = 1.75
filament_density = 1.27
filament_cost = 25
extrusion_multiplier = 0.95

# Temperatures
temperature = 235
first_layer_temperature = 240
bed_temperature = 75
first_layer_bed_temperature = 80

# Cooling / Fan (low fan for PETG)
fan_always_on = 1
min_fan_speed = 30
max_fan_speed = 50
bridge_fan_speed = 70
disable_fan_first_layers = 3
full_fan_speed_layer = 5
cooling = 1
min_print_speed = 10
slowdown_below_layer_time = 15
fan_below_layer_time = 60

# Filament overrides
filament_max_volumetric_speed = 15

# --- Advanced ---
resolution = 0
gcode_resolution = 0.0125
xy_size_compensation = 0
elefant_foot_compensation = 0.2
clip_multipart_objects = 0
avoid_crossing_perimeters = 0
bridge_flow_ratio = 0.95
slice_closing_radius = 0.049
